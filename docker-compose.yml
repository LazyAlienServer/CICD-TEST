services:
  cicd-service:
    build:
      context: .
      dockerfile: cicd-service/Dockerfile
    environment:
      FIXTURE_VERSION: ${FIXTURE_VERSION:-compose-local}
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health/readiness"]
      interval: 10s
      timeout: 3s
      retries: 12

  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    environment:
      FIXTURE_VERSION: ${FIXTURE_VERSION:-compose-local}
      CICD_SERVICE_URL: http://cicd-service:8082
    ports:
      - "9090:9090"
    depends_on:
      cicd-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/actuator/health/readiness"]
      interval: 10s
      timeout: 3s
      retries: 12
