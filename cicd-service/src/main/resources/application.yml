server:
  port: 8082

spring:
  application:
    name: cicd-service
  datasource:
    url: jdbc:h2:mem:cicd-fixture;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

fixture:
  version: ${FIXTURE_VERSION:local}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
