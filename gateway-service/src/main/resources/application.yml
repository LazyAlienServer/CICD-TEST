server:
  port: 9090

spring:
  application:
    name: gateway-service

fixture:
  version: ${FIXTURE_VERSION:local}
  cicd-service:
    base-url: ${CICD_SERVICE_URL:http://localhost:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
